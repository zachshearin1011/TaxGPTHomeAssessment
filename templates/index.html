{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaxGPT — Financial Chatbot</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #242736;
      --border: #2e3145;
      --text: #e4e6f0;
      --text-muted: #8b8fa3;
      --accent: #6c63ff;
      --accent-hover: #5a52d5;
      --user-bg: #2a2d4a;
      --bot-bg: #1e2130;
      --success: #4ade80;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 700;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }

    .status-text {
      font-size: 13px;
      color: var(--text-muted);
    }

    button.reset-btn {
      padding: 6px 14px;
      background: var(--surface-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }

    button.reset-btn:hover {
      background: var(--border);
      color: var(--text);
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .avatar.bot { background: var(--accent); }
    .avatar.user { background: var(--surface-2); }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14.5px;
      max-width: 680px;
      word-wrap: break-word;
    }

    .message.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
    }

    .message.user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(108, 99, 255, 0.2);
    }

    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { margin: 8px 0; padding-left: 20px; }
    .bubble li { margin-bottom: 4px; }
    .bubble code {
      background: rgba(108, 99, 255, 0.15);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
    .bubble pre {
      background: var(--bg);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble pre code {
      background: none;
      padding: 0;
    }
    .bubble strong { color: #fff; }

    .meta-bar {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .meta-tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--surface-2);
      color: var(--text-muted);
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 8px 0;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .input-area {
      padding: 16px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .input-wrapper {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
    }

    .input-wrapper textarea {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-size: 14.5px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 46px;
      max-height: 120px;
      transition: border-color 0.2s;
    }

    .input-wrapper textarea:focus {
      border-color: var(--accent);
    }

    .input-wrapper textarea::placeholder {
      color: var(--text-muted);
    }

    button.send-btn {
      padding: 0 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button.send-btn:hover { background: var(--accent-hover); }
    button.send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .welcome {
      text-align: center;
      max-width: 600px;
      margin: 60px auto 0;
    }

    .welcome h2 {
      font-size: 28px;
      margin-bottom: 12px;
    }

    .welcome p {
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .example-queries {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .example-btn {
      padding: 8px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }

    .example-btn:hover {
      background: var(--border);
      border-color: var(--accent);
    }

    .stream-content { display: inline; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">T</div>
      <span>TaxGPT</span>
    </div>
    <div class="header-actions">
      <div class="status-dot"></div>
      <span class="status-text">Connected</span>
      <button class="reset-btn" onclick="resetChat()">New Chat</button>
    </div>
  </header>

  <div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcome">
      <h2>Ask anything about tax &amp; finance</h2>
      <p>
        I can answer questions about tax data, IRS Form 1040 instructions,
        US Tax Code, and financial concepts using hybrid vector + graph retrieval.
      </p>
      <div class="example-queries">
        <button class="example-btn" onclick="askExample(this)">What is the average tax owed by corporations in CA?</button>
        <button class="example-btn" onclick="askExample(this)">Explain the standard deduction for 2023</button>
        <button class="example-btn" onclick="askExample(this)">How many individual taxpayers are in the dataset?</button>
        <button class="example-btn" onclick="askExample(this)">What are the filing requirements for head of household?</button>
        <button class="example-btn" onclick="askExample(this)">Compare tax owed between partnerships and trusts</button>
        <button class="example-btn" onclick="askExample(this)">What does Section 179 allow?</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="userInput"
        placeholder="Ask a financial or tax question..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoGrow(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  {% csrf_token %}
  <script>
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const welcome = document.getElementById('welcome');
    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
    let isStreaming = false;

    function autoGrow(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function askExample(btn) {
      userInput.value = btn.textContent;
      sendMessage();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatMarkdown(text) {
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      text = text.replace(/```[\w]*\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
      text = text.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
      text = text.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
      text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
      text = text.replace(/\n{2,}/g, '</p><p>');
      text = '<p>' + text + '</p>';
      text = text.replace(/<p>\s*<\/p>/g, '');
      text = text.replace(/\n/g, '<br>');
      return text;
    }

    function addMessage(role, content, meta) {
      if (welcome) welcome.style.display = 'none';

      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = `avatar ${role}`;
      avatar.textContent = role === 'bot' ? 'T' : 'U';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = role === 'bot' ? formatMarkdown(content) : `<p>${escapeHtml(content)}</p>`;

      if (meta && role === 'bot') {
        appendMetaBar(bubble, meta);
      }

      msgDiv.appendChild(avatar);
      msgDiv.appendChild(bubble);
      chatContainer.appendChild(msgDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return msgDiv;
    }

    function createStreamingMessage() {
      if (welcome) welcome.style.display = 'none';

      const msgDiv = document.createElement('div');
      msgDiv.className = 'message bot';

      const avatar = document.createElement('div');
      avatar.className = 'avatar bot';
      avatar.textContent = 'T';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      const contentEl = document.createElement('div');
      contentEl.className = 'stream-content';
      bubble.appendChild(contentEl);

      msgDiv.appendChild(avatar);
      msgDiv.appendChild(bubble);
      chatContainer.appendChild(msgDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      return { msgDiv, bubble, contentEl };
    }

    function appendMetaBar(bubble, meta) {
      const metaBar = document.createElement('div');
      metaBar.className = 'meta-bar';
      if (meta.query_type) {
        const tag = document.createElement('span');
        tag.className = 'meta-tag';
        tag.textContent = `Query: ${meta.query_type}`;
        metaBar.appendChild(tag);
      }
      if (meta.sources && meta.sources.length) {
        meta.sources.forEach(s => {
          const tag = document.createElement('span');
          tag.className = 'meta-tag';
          tag.textContent = s;
          metaBar.appendChild(tag);
        });
      }
      bubble.appendChild(metaBar);
    }

    function addTyping() {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message bot';
      msgDiv.id = 'typing';

      const avatar = document.createElement('div');
      avatar.className = 'avatar bot';
      avatar.textContent = 'T';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

      msgDiv.appendChild(avatar);
      msgDiv.appendChild(bubble);
      chatContainer.appendChild(msgDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function sendMessage() {
      const msg = userInput.value.trim();
      if (!msg || isStreaming) return;

      isStreaming = true;
      sendBtn.disabled = true;
      userInput.value = '';
      userInput.style.height = 'auto';

      addMessage('user', msg);
      addTyping();

      let streamMeta = {};
      let fullText = '';

      try {
        const res = await fetch('/api/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
          body: JSON.stringify({ message: msg }),
        });

        removeTyping();

        if (!res.ok) {
          const err = await res.json();
          addMessage('bot', `Error: ${err.detail || 'Something went wrong'}`);
          isStreaming = false;
          sendBtn.disabled = false;
          userInput.focus();
          return;
        }

        const { bubble, contentEl } = createStreamingMessage();

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;

            let payload;
            try { payload = JSON.parse(line.slice(6)); }
            catch { continue; }

            if (payload.type === 'meta') {
              streamMeta = {
                sources: payload.sources || [],
                query_type: payload.query_type || '',
              };
            } else if (payload.type === 'token') {
              fullText += payload.content;
              const node = contentEl.lastChild;
              if (node && node.nodeType === Node.TEXT_NODE) {
                node.nodeValue += payload.content;
              } else {
                contentEl.appendChild(document.createTextNode(payload.content));
              }
              chatContainer.scrollTop = chatContainer.scrollHeight;
            } else if (payload.type === 'done') {
              contentEl.innerHTML = formatMarkdown(fullText);
              appendMetaBar(bubble, streamMeta);
              chatContainer.scrollTop = chatContainer.scrollHeight;
            }
          }
        }

      } catch (err) {
        removeTyping();
        addMessage('bot', `Connection error: ${err.message}`);
      }

      isStreaming = false;
      sendBtn.disabled = false;
      userInput.focus();
    }

    async function resetChat() {
      await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
        body: JSON.stringify({ message: '', reset: true }),
      }).catch(() => {});

      chatContainer.innerHTML = '';
      if (welcome) {
        welcome.style.display = '';
        chatContainer.appendChild(welcome);
      }
    }

    userInput.focus();
  </script>
</body>
</html>
